# RepGreen - Auto Contribution Graph Updater
# Runs daily at 18:00 WIB (UTC+7)
name: RepGreen Auto Update

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run RepGreen
        env:
          GH_TOKEN: ${{ secrets.REPGREEN_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          MIN_C: '15'
          MAX_C: '35'
          PY_SCRIPT: ''
          WF_CONTENT: ''
        run: |
          echo "$PY_SCRIPT" | base64 -d > /tmp/repgreen_run.py
          python3 /tmp/repgreen_run.py
